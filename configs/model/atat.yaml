_target_: src.models.atat_module.ATATLitModule

use_tabular: false
use_lightcurve: false

num_classes: 9
plot_all_epochs_cms: false
optimizer:
  _target_: torch.optim.AdamW
  _partial_: true
  lr: 0.0001
  weight_decay: 0.001
  betas: [0.9, 0.98]

lc_net:
  _target_: src.models.components.atat_lightcurve.ATATLightcurve
  num_heads: 4
  dropout: 0.2
  prenorm: true
  embedding_size: 192
  k_sparse_percentage: 0.0
  num_encoders: 3
  num_harmonics: 64
  time_encoder: TimeFilm
  expansion_coef: 2

feat_net:
  _target_: src.models.components.atat_features.ATATFeatures
  num_heads: 4
  dropout: 0.2
  prenorm: true
  embedding_size: 128
  use_features: true
  use_metadata: true
  num_features: 191
  num_metadata: 8
  k_sparse_percentage: 0.0
  num_encoders: 3
  expansion_coef: 2
  

mix_classifier:
  _target_: src.models.components.classifiers.MLPClassifier
  num_classes: ${model.num_classes}
  dropout: 0.2
  embedding_size: 320

feat_classifier:
  _target_: src.models.components.classifiers.LinearClassifier
  num_classes: ${model.num_classes}
  embedding_size: ${model.feat_net.embedding_size}
lc_classifier:
  _target_: src.models.components.classifiers.LinearClassifier
  num_classes: ${model.num_classes}
  embedding_size: ${model.lc_net.embedding_size}
# compile model for faster training with pytorch 2.0
compile: false
