_target_: src.models.efatat_module.EFATATModule

num_classes: 9
plot_all_epochs_cms: false
optimizer:
  _target_: torch.optim.AdamW
  _partial_: true
  lr: 0.0001
  weight_decay: 0.001
  betas: [0.9, 0.98]

encoder:
  _target_: src.models.components.causal_efmhsa_net_V2.EFATAT
  time_encoder:
    _target_: src.models.components.transformer.encoders.FlexiblePositionalEncoderHandler
    embedding_size: 128
    seq_length: 2048
    num_bands: 2
    reduced_size_factor: 2
    dropout: 0.1
    use_sinusoidal: false
    use_conv_mag: true
    use_mag_diff: false
    use_time_diff: true
    use_rate: true
    use_band_embedding: false
    use_abs_time_mlp: false
    use_abs_mag_mlp: false
    fusion_strategy: "mlp"
    mlp_layers: 2
    normalize_embeddings: false
    
  num_heads: 4
  dropout: 0.2
  prenorm: true
  embedding_size: 128
  k_sparse_percentage: 0.0
  num_encoders: 3
  num_bands: 2
  use_features: true
  use_metadata: true
  num_features: 191
  num_metadata: 8
  causal_mask: true

classifier:
  _target_: src.models.components.classifiers.LinearClassifier
  num_classes: ${model.num_classes}
  embedding_size: ${model.encoder.embedding_size}
# compile model for faster training with pytorch 2.0
compile: false
