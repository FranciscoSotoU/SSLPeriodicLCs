# @package _global_

# to execute this experiment run:
# python train.py experiment=example

defaults:
  - override /data: fpv2
  - override /model: atat_patches
  - override /callbacks: default
  - override /trainer: default
#  - override /hydra: ray

# all parameters below will be merged with parameters from default configurations set above
# this allows you to overwrite only specified parameters
exp_name: "DiViT_L_AC_VICReg_MM"
tags: ['divit','periodic_classes','multimodal','full']

seed: 41
test: true
trainer:
  min_epochs: 1
  max_epochs: 200
  precision: 'bf16-mixed'
  log_every_n_steps: 1
  accelerator: gpu
  devices: [0]


model:
  #pre_trained_lc_path: /home/fsoto/Documents/LCsSSL/logs/pre_trained_models/VICReg_divit_L
  class_names: ['AGN', 'EB/EW', 'Blazar', 'CEP', 'LPV', 'CV/Nova', 'Periodic-Other', 'Microlensing', 'QSO', 'DSCT', 'EA', 'RRLab', 'RSCVn', 'RRLc', 'SLSN', 'SNII', 'SNIbc', 'SNIIn', 'SNIa', 'TDE', 'YSO']
  class_names_order: ['SNIa', 'SNIbc', 'SNII', 'SNIIn', 'SLSN', 'TDE', 'Microlensing', 'QSO', 'AGN', 'Blazar', 'YSO', 'CV/Nova', 'LPV', 'EA', 'EB/EW', 'Periodic-Other', 'RSCVn', 'CEP', 'RRLab', 'RRLc', 'DSCT']
  #class_names: ['CEP', 'DSCT', 'EA', 'EB/EW', 'LPV', 'Periodic-Other', 'RRLab', 'RRLc', 'RSCVn']
  freeze_lc_encoder: false
  use_tabular: true
  use_lightcurve: true
  compile: false
  num_classes: 21
  warmup_epochs: 10
  lc_net:
    patch_size: 8
    use_proj_drop: false
    embedding_size: 256
    
  lc_classifier:
    embedding_size: 256
  mix_classifier:
    embedding_size: 384
data:
  sequence_type: full
  #subset_name: all
  max_length: 2048
  batch_size: 128
  num_workers: 12
  use_features: ${model.use_tabular}
  use_metadata: ${model.use_tabular}
  normalize_tab: ${model.use_tabular}
  mta: true
  eval_time: [8,16,32,64,128,256,512,1024,None]
  patch_size: 8
  use_collate: true



logger:
  wandb:
    project: "Astronomy-Classification"
    tags: ${tags}
    group: 'DiViT-Large-VICReg-AC'

hydra:
  mode: MULTIRUN
  sweeper:
    params:
      ++data.split: 0,1,2,3,4
      #++model.pre_trained_iteration: 0,1,2,3,4
  #launcher:
