  #    init:
  #      num_gpus: 1
  #      num_cpus: 16
  #      runtime_env:
  #        env_vars:
  #          CUDA_VISIBLE_DEVICES: "1"
  #    remote:
  #      num_gpus: 0.33
  #      max_calls: 3

      
     