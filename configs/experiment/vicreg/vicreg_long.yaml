# @package _global_

# to execute this experiment run:
# python train.py experiment=augmentations_ablation/vicreg_channel_shuffle_ablation

defaults:
  - override /data: fpv2_ssl
  - override /model: vicreg_lc
  - override /callbacks: default
  - override /trainer: default
 # - override /hydra: ray
# all parameters below will be merged with parameters from default configurations set above
# this allows you to overwrite only specified parameters
callbacks:
  early_stopping:
    patience: 50
exp_name: "DiffT_VICReg_Lightcurves"
tags: ['vicreg_lc','periodic','lcs','full','all_augmentations']
test: False
seed: 42
trainer:
  min_epochs: 1
  max_epochs: 500
  precision: 'bf16-mixed'
  log_every_n_steps: 1
  accelerator: gpu
  devices: [0]

model:
  inv_loss_weight: 25.0
  cov_loss_weight: 1.0
  std_loss_weight: 25.0
  warmup_epochs: 50
  projector:
    projection_size: 4096

data:
  sequence_type: full
  max_length: 511
  batch_size: 512
  filter: false
  dino: false
  transform:
    transform_list:
      - random_noise2
      - scaling
      - resampling
      - random_mask
    random_noise_prob: 0.5
    scaling_prob: 0.5
    signal_resampling_prob: 0.5
    random_mask_prob: 0.5

  transform_prime:
    transform_list:
      - random_noise2
      - scaling
      - resampling
      - random_mask
    random_noise_prob: 0.5
    scaling_prob: 0.5
    signal_resampling_prob: 0.5
    random_mask_prob: 0.5


  filter_subset: Periodic
  
logger:
  wandb:
    project: "VICReg-LightCurves-Paper"
    tags: ${tags}
    group: "DiffT-Long"

hydra:
  mode: MULTIRUN
  sweeper:
    params:
     ++data.split: 0,1,2,3,4
