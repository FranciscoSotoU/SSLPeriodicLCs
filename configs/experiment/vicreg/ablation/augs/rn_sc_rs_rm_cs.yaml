# @package _global_

defaults:
  - override /data: fpv2_ssl
  - override /model: vicreg_lc
  - override /callbacks: default
  - override /trainer: default

callbacks:
  early_stopping:
    patience: 50
exp_name: "VICReg_Lightcurves_Ablation_RN_SC_RS_RM_CS"
tags: ['vicreg_lc','periodic','lcs','full','all_augmentations']
test: False
seed: 42
trainer:
  min_epochs: 1
  max_epochs: 50
  precision: 'bf16-mixed'
  log_every_n_steps: 1
  accelerator: gpu
  devices: [0]

model:
  inv_loss_weight: 25.0
  cov_loss_weight: 1.0
  std_loss_weight: 25.0
  warmup_epochs: 10
  projector:
    projection_size: 4096

data:
  sequence_type: full
  max_length: 511
  batch_size: 512
  filter: false
  dino: false
  transform:
    transform_list:
      - random_noise2
      - scaling
      - resampling
      - random_mask
      - channel_shuffle
    random_noise_prob: 0.5
    scaling_prob: 0.5
    signal_resampling_prob: 0.5
    random_mask_prob: 0.5
    channel_shuffle_prob: 0.5
  transform_prime:
    transform_list:
      - random_noise2
      - scaling
      - resampling
      - random_mask
    random_noise_prob: 0.5
    scaling_prob: 0.5
    signal_resampling_prob: 0.5
    random_mask_prob: 0.5
    channel_shuffle_prob: 0.2

  filter_subset: Periodic

logger:
  wandb:
    project: "VICReg-LightCurves-Paper"
    tags: ${tags}
    group: "Augs-RN-SC-RS-RM-CS"

hydra:
  mode: MULTIRUN
  sweeper:
    params:
     ++data.split: 0,1,2,3,4
