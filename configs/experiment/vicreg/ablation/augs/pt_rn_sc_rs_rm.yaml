# @package _global_

defaults:
  - override /data: fpv2
  - override /model: atat_new
  - override /callbacks: default
  - override /trainer: default
  - override /hydra: ray

exp_name: "VICReg_LinearCLF_RN_SC_RS_RM"
tags: ['atat_modified','periodic_classes','multimodal','full','pretrained', 'vicreg','linearCLF']

seed: 42
test: true
trainer:
  min_epochs: 1
  max_epochs: 100
  precision: 'bf16-mixed'
  log_every_n_steps: 1
  accelerator: gpu

model:
  pre_trained_lc_path: /home/fsoto/Documents/SSLPeriodicLCs/logs/train/multiruns/VICReg_Lightcurves_Ablation_RN_SC_RS_RM_2026-01-21_20-01-40
  class_names: ['CEP', 'DSCT', 'EA', 'EB/EW', 'LPV', 'Periodic-Other', 'RRLab', 'RRLc', 'RSCVn']
  freeze_lc_encoder: true
  use_tabular: false
  use_lightcurve: true
  compile: false
  num_classes: 9
  warmup_epochs: 10

data:
  sequence_type: full
  subset_name: periodic
  max_length: 2047
  batch_size: 128
  num_workers: 12
  use_features: ${model.use_tabular}
  use_metadata: ${model.use_tabular}
  normalize_tab: ${model.use_tabular}
  mta: true
  eval_time: [8,16,32,64,128,256,512,1024,None]

logger:
  wandb:
    project: "Paper-Periodic-LightCurves-Classification"
    tags: ${tags}
    group: "VICReg-Linear-Aug-RN-SC-RS-RM"

hydra:
  mode: MULTIRUN
  sweeper:
    params:
      ++data.split: 0,1,2,3,4
      ++model.pre_trained_iteration: 0,1,2,3,4
  launcher:
    ray:
      init:
        num_gpus: 1
        num_cpus: 16
        runtime_env:
          env_vars:
            CUDA_VISIBLE_DEVICES: "0"
      remote:
        num_gpus: 0.2
        max_calls: 5