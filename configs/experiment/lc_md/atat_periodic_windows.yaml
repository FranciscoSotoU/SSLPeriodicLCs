# @package _global_

# to execute this experiment run:
# python train.py experiment=multimodal/atat_periodic_windows
defaults:
  - override /data: fpv2
  - override /model: atat
  - override /callbacks: default
  - override /trainer: default
  - override /hydra: ray

# all parameters below will be merged with parameters from default configurations set above
# this allows you to overwrite only specified parameters
exp_name: "ATAT_Periodic_LC_MD_Windows"
tags: ['atat','periodic_classes','Lightcurves','Metadata','windows']

seed: 41

trainer:
  min_epochs: 1
  max_epochs: 200
  precision: 'bf16-mixed'
  log_every_n_steps: 1
  accelerator: gpu
  devices: [0]





model:
  class_names: ['CEP', 'DSCT', 'EA', 'EB/EW', 'LPV', 'Periodic-Other', 'RRLab', 'RRLc', 'RSCVn']
  use_tabular: true
  use_lightcurve: true
  compile: false
  num_classes: 9
  warmup_epochs: 10
  feat_net:
    use_features: false
    

data:
  sequence_type: windows
  subset_name: periodic
  max_length: 200
  batch_size: 512
  num_workers: 4
  use_features: false
  use_metadata: ${model.use_tabular}
  normalize_tab: ${model.use_tabular}
  mta: true
  eval_time: [8,16,32,64,128,256,512,1024,None]



logger:
  wandb:
    project: "Astronomy-Classification-Periodic"
    tags: ${tags}
    group: 'ATAT-Windows_LC_MD'

hydra:
  mode: MULTIRUN
  sweeper:
    params:
      ++data.split: 0,1,2,3,4

  launcher:
    ray:
      init:
        num_gpus: 1
        num_cpus: 16
        runtime_env:
          env_vars:
            CUDA_VISIBLE_DEVICES: "1"
      remote:
        num_gpus: 0.33
        max_calls: 3
