# @package _global_

# to execute this experiment run:
# python train.py experiment=augmentations_ablation/vicreg_channel_shuffle_ablation

defaults:
  - override /data: fpv2_ssl
  - override /model: vicreg_lc_patched
  - override /callbacks: default
  - override /trainer: default
  #- override /hydra: ray
# all parameters below will be merged with parameters from default configurations set above
# this allows you to overwrite only specified parameters
callbacks:
  early_stopping:
    patience: 50
exp_name: "VICReg_Lightcurves_Long_Exp_Patched_1M_BIG"
tags: ['vicreg_lc','periodic','lcs','full','all_augmentations']
test: False
seed: 42
trainer:
  min_epochs: 1
  max_epochs: 500
  precision: 'bf16-mixed'
  log_every_n_steps: 1
  accelerator: gpu
  devices: [0]
  gradient_clip_val: 1.0
  #val_check_interval: 500
  #limit_val_batches: 0.1

model:
  inv_loss_weight: 5.0
  cov_loss_weight: 1.0
  std_loss_weight: 25.0
  warmup_epochs: 10
  optimizer:
    _target_: torch.optim.AdamW
    _partial_: true
    lr: 0.0001
    weight_decay: 0.01
    betas: [0.9, 0.98]

  projector:
    projection_size: 8192
    embedding_size: 256
  network:
    embedding_size: 256
    patch_size: 8
    use_proj_drop: false
    num_encoders: 12
    num_heads: 8

data:
  subset_name: null
  data_name: ssl_data_1M/final/dataset
  sequence_type: full
  dino: false
  max_length: 512
  batch_size: 512
  patch_size: 8
  transform:
    transform_list:
      - time_shift
      - random_noise
      - resampling
      - random_mask
      - channel_shuffle
      

    random_noise_prob: 0.5
    signal_resampling_prob: 0.5
    random_mask_prob: 0.5
    channel_shuffle_prob: 0.5
    time_shift_prob: 0.5


  transform_prime:
    transform_list:
      - time_shift
      - random_noise
      - resampling
      - random_mask
      - channel_shuffle
      

    random_noise_prob: 0.5
    signal_resampling_prob: 0.5
    random_mask_prob: 0.5
    channel_shuffle_prob: 0.5
    time_shift_prob: 0.5


  filter_subset: Periodic
  
logger:
  wandb:
    project: "VICReg-LightCurves-Long-Ablation"
    tags: ${tags}
    group: "long_500_patched_1M_Big"

hydra:
  mode: MULTIRUN
  sweeper:
    params:
     ++data.split: 0
