# @package _global_

# to execute this experiment run:
# python train.py experiment=augmentations_ablation/vicreg_channel_shuffle_ablation

defaults:
  - override /data: fpv2_ssl
  - override /model: vicreg_lc
  - override /callbacks: default
  - override /trainer: default
#  - override /hydra: ray
# all parameters below will be merged with parameters from default configurations set above
# this allows you to overwrite only specified parameters
exp_name: "VICReg_RN_RS_RM_Simetrical_Ablation"
tags: ['vicreg_lc','periodic','lcs','full','all_augmentations']
test: False
seed: 42
trainer:
  min_epochs: 1
  max_epochs: 50
  precision: 'bf16-mixed'
  log_every_n_steps: 1
  accelerator: gpu
  devices: [0]

model:
  warmup_epochs: 10
  projector:
    projection_size: 512  # Ablation for projector size

data:
  sequence_type: full
  max_length: 511
  batch_size: 512
  transform:
    transform_list:
      - random_noise
      - resampling
      - random_mask

    random_noise_prob: 1.0
    signal_resampling_prob: 1.0
    random_mask_prob: 1.0


  transform_prime:
    transform_list:
      - random_noise
      - resampling
      - random_mask

    random_noise_prob: 1.0
    signal_resampling_prob: 1.0
    random_mask_prob: 1.0



  filter_subset: Periodic
  
logger:
  wandb:
    project: "VICReg-LightCurves-Augmentations-Multiple-Ablation"
    tags: ${tags}
    group: "random_noise-resampling-random_mask"

hydra:
  mode: MULTIRUN
  sweeper:
    params:
     ++data.split: 0,1,2,3,4
