# @package _global_

# to execute this experiment run:
# python train.py experiment=augmentations_ablation/vicreg_time_shift_ablation_double

defaults:
  - override /data: fpv2_ssl
  - override /model: vicreg_lc
  - override /callbacks: default
  - override /trainer: default
#  - override /hydra: ray

# all parameters below will be merged with parameters from default configurations set above
# this allows you to overwrite only specified parameters
exp_name: "VICReg_TimeShift_Ablation_Double_V2"
tags: ['vicreg_lc','periodic','lcs','full','time_shift', 'temporal_shift']
test: False
seed: 42

trainer:
  min_epochs: 1
  max_epochs: 50
  precision: 'bf16-mixed'
  log_every_n_steps: 1
  accelerator: gpu
  devices: [0]

model:
  warmup_epochs: 10
    
data:
  sequence_type: full
  max_length: 511
  batch_size: 512
  # Recommended configuration for light curve VICRev - Time Shift focus
  transform:
    transform_list:
      - ${first_transform}
      - ${second_transform}
    channel_shuffling_prob: 1
    random_mask_prob: 1
    random_noise_prob: 1
    signal_resampling_prob: 1
    time_shift_prob: 1

  filter_subset: Periodic
  
logger:
  wandb:
    project: "VICReg-LightCurves-Augmentations-Ablation"
    tags: ${tags}
    group: "${first_transform}_${second_transform}_v2"

hydra:
  mode: MULTIRUN
  sweeper:
    params:
     ++second_transform: channel_shuffle,random_mask,random_noise,resampling
     ++first_transform: time_shift
     ++data.split: 0,1,2,3,4
