# @package _global_

# to execute this experiment run:
# python train.py experiment=augmentations_ablation/random_mask_ablation

defaults:
  - override /data: fpv2_ssl
  - override /model: vicreg_lc
  - override /callbacks: default
  - override /trainer: default
  - override /hydra: ray
# all parameters below will be merged with parameters from default configurations set above
# this allows you to overwrite only specified parameters
exp_name: "VICReg_RandomMask_Ablation"
tags: ['vicreg_lc','periodic','lcs','full','random_mask', 'time_shift']
test: False
seed: 42

trainer:
  min_epochs: 1
  max_epochs: 50
  precision: 'bf16-mixed'
  log_every_n_steps: 1
  accelerator: gpu
  devices: [0]

model:
  warmup_epochs: 10
    
data:
  sequence_type: full
  max_length: 511
  batch_size: 512
  # Recommended configuration for light curve VICReg
  transform:
    transform_list:
      - random_mask
    random_mask_prob: 1

  filter_subset: Periodic
  
logger:
  wandb:
    project: "VICReg-LightCurves-Augmentations-Ablation"
    tags: ${tags}
    group: "random_mask, time_shift"

hydra:
  mode: MULTIRUN
  sweeper:
    params:
     ++data.split: 0,1,2,3,4
