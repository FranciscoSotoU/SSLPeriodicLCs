# @package _global_

# to execute this experiment run:
# python train.py experiment=augmentations_ablation/vicreg_channel_shuffle_ablation

defaults:
  - override /data: fpv2_ssl
  - override /model: vicreg_lc
  - override /callbacks: default
  - override /trainer: default
  - override /hydra: ray
# all parameters below will be merged with parameters from default configurations set above
# this allows you to overwrite only specified parameters
exp_name: "VICReg_Projection_Size_Ablation_Linear"
tags: ['vicreg_lc','periodic','lcs','full','all_augmentations']
test: False
seed: 42
trainer:
  min_epochs: 1
  max_epochs: 50
  precision: 'bf16-mixed'
  log_every_n_steps: 1
  accelerator: gpu
  devices: [0]

model:
  warmup_epochs: 10
  projector:
    _target_: src.models.components.projectors.LinearProjector
    projection_size: 8192  # Ablation for projector size

data:
  sequence_type: full
  max_length: 511
  batch_size: 512
  # Recommended configuration for light curve VICReg - Channel Shuffling focus
  transform:
    transform_list:
      - random_mask
      - resampling
      - random_noise
      - channel_shuffle
      - time_shift
      
    channel_shuffling_prob: 0.3
    random_mask_prob: 0.8
    random_noise_prob: 1
    signal_resampling_prob: 1
    time_shift_prob: 0.5

  transform_prime:
    transform_list:
      - random_mask
      - resampling
      - random_noise
      - channel_shuffle
      - time_shift
      
    channel_shuffling_prob: 0.3
    random_mask_prob: 0.2
    random_noise_prob: 1
    signal_resampling_prob: 1
    time_shift_prob: 0.5
      

  filter_subset: Periodic
  
logger:
  wandb:
    project: "VICReg-LightCurves-Projection-Ablation"
    tags: ${tags}
    group: "all_augmentations_linear"

hydra:
  mode: MULTIRUN
  sweeper:
    params:
     ++data.split: 0,1,2,3,4
     ++model.projector.projection_size: 128,256,512, 1024, 2048, 4096, 8192