# @package _global_

# to execute this experiment run:
# python train.py experiment=example

defaults:
  - override /data: fpv2
  - override /model: atat_new
  - override /callbacks: default
  - override /trainer: default
  - override /hydra: ray

# all parameters below will be merged with parameters from default configurations set above
# this allows you to overwrite only specified parameters
exp_name: "VICReg_Params_1_Ablation_LinearCLF"
tags: ['atat_modified','periodic_classes','multimodal','full','pretrained', 'vicreg','linearCLF']

seed: 42
test: False
trainer:
  min_epochs: 1
  max_epochs: 50
  precision: 'bf16-mixed'
  log_every_n_steps: 1
  accelerator: gpu
  devices: [0]





model:
  pre_trained_lc_path: /home/fsoto/Documents/LCsSSL/logs/train/multiruns/VICReg_Parameters_Ablation_1_2025-08-11_08-23-32
  class_names: ['CEP', 'DSCT', 'EA', 'EB/EW', 'LPV', 'Periodic-Other', 'RRLab', 'RRLc', 'RSCVn']
  freeze_lc_encoder: true
  use_tabular: false
  use_lightcurve: true
  compile: false
  num_classes: 9
  warmup_epochs: 10


data:
  sequence_type: full
  subset_name: periodic
  max_length: 2047
  batch_size: 128
  num_workers: 12
  use_features: ${model.use_tabular}
  use_metadata: ${model.use_tabular}
  normalize_tab: ${model.use_tabular}
  mta: false
  eval_time: [8,16,32,64,128,256,512,1024,None]



logger:
  wandb:
    project: "VICReg-Params-LinearCLF-Ablation"
    tags: ${tags}
    group: "1"

hydra:
  mode: MULTIRUN
  sweeper:
    params:
      ++data.split: 0,1,2,3,4
      ++model.pre_trained_iteration: range(5)
      
     
    