# @package _global_

# to execute this experiment run:
# python train.py experiment=example

defaults:
  - override /data: fpv2
  - override /model: atat_new
  - override /callbacks: default
  - override /trainer: default
#  - override /hydra: ray

# all parameters below will be merged with parameters from default configurations set above
# this allows you to overwrite only specified parameters
exp_name: "DIFFT_Periodic_PE"
tags: ['atat','periodic_classes','multimodal','full']

seed: 41

trainer:
  min_epochs: 1
  max_epochs: 200
  precision: 'bf16-mixed'
  log_every_n_steps: 1
  accelerator: gpu
  devices: [1]


model:
  class_names: ['CEP', 'DSCT', 'EA', 'EB/EW', 'LPV', 'Periodic-Other', 'RRLab', 'RRLc', 'RSCVn']
  use_tabular: false
  use_lightcurve: true
  compile: false
  num_classes: 9
  warmup_epochs: 10

    

data:
  sequence_type: full
  subset_name: periodic
  max_length: 2047
  batch_size: 128
  num_workers: 4
  use_features: ${model.use_tabular}
  use_metadata: ${model.use_tabular}
  normalize_tab: ${model.use_tabular}
  mta: true
  detections: true
  eval_time: [8,16,32,64,128,256,512,1024,None]
  #norm_type: arcsinh
  selected_features:
  - Multiband_period_12
  - PPE_12
  - delta_period_1
  - delta_period_2



logger:
  wandb:
    project: "Paper-Periodic-LightCurves-Classification"
    tags: ${tags}
    group: 'DIFFT-PE'

hydra:
  mode: MULTIRUN
  sweeper:
    params:
      ++data.split: 0,1,2,3
      #++data.percentage: 0.01,0.1,0.25,0.5,1.0

  #launcher:
