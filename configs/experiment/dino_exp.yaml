# @package _global_

# to execute this experiment run:
# python train.py experiment=augmentations_ablation/vicreg_channel_shuffle_ablation

defaults:
  - override /data: fpv2_ssl
  - override /model: dino_lc
  - override /callbacks: default
  - override /trainer: default
#  - override /hydra: ray
# all parameters below will be merged with parameters from default configurations set above
# this allows you to overwrite only specified parameters
callbacks:
  early_stopping:
    patience: 50
exp_name: "DINO_exp"
tags: ['vicreg_lc','periodic','lcs','full','all_augmentations']
test: False
seed: 42
trainer:
  min_epochs: 1
  max_epochs: 200
  precision: 'bf16-mixed'
  log_every_n_steps: 1
  accelerator: gpu
  devices: [0]


data:
  sequence_type: full
  dino: true
  max_length: 512
  batch_size: 512
  patch_size: 8
  transform:
    transform_list:
      - random_noise2
      - channel_shuffle
      - scaling
#    - resampling
      - dino

      

    random_noise_prob: 0.5
    channel_shuffle_prob: 0.3
    scaling_prob: 0.5
#    signal_resampling_prob: 0.5


  filter_subset: Periodic
  
logger:
  wandb:
    project: "DINO_exp"
    tags: ${tags}
    group: "long_500"

hydra:
  mode: MULTIRUN
  sweeper:
    params:
     ++data.split: 0
