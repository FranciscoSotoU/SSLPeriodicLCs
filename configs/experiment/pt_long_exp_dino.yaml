# @package _global_

# to execute this experiment run:
# python train.py experiment=example

defaults:
  - override /data: fpv2
  - override /model: atat_patches
  - override /callbacks: default
  - override /trainer: default
  #- override /hydra: ray

# all parameters below will be merged with parameters from default configurations set above
# this allows you to overwrite only specified parameters
exp_name: "DINO_LinearCLF_Patched_V2"
tags: ['atat_modified','periodic_classes','multimodal','full','pretrained', 'dino','linearCLF']

seed: 42
test: true
trainer:
  min_epochs: 1
  max_epochs: 100
  precision: 'bf16-mixed'
  log_every_n_steps: 1
  accelerator: gpu
  devices: [0]





model:
  pre_trained_lc_path: /home/fsoto/Documents/LCsSSL/logs/train/multiruns/DINO_exp_2025-09-03_14-02-54
  class_names: ['CEP', 'DSCT', 'EA', 'EB/EW', 'LPV', 'Periodic-Other', 'RRLab', 'RRLc', 'RSCVn']
  dino: true
  freeze_lc_encoder: true
  use_tabular: false
  use_lightcurve: true
  compile: false
  num_classes: 9
  warmup_epochs: 10
  lc_net:
    patch_size: 8
    use_proj_drop: false
    embedding_size: 128
    
  lc_classifier:
    embedding_size: 128

data:
  sequence_type: full
  subset_name: periodic
  max_length: 2048
  batch_size: 128
  num_workers: 12
  use_features: ${model.use_tabular}
  use_metadata: ${model.use_tabular}
  normalize_tab: ${model.use_tabular}
  mta: false
  eval_time: [8,16,32,64,128,256,512,1024,None]
  patch_size: 8
  use_collate: true



logger:
  wandb:
    project: "Astronomy-Classification-Periodic-Lightcurve"
    tags: ${tags}
    group: "DINO-Linear-Patched"

hydra:
  mode: MULTIRUN
  sweeper:
    params:
      ++data.split: 0,1,2,3,4
      ++model.pre_trained_iteration: 0


      
     
