#  auto_insert_metric_name: False
#  verbose: False

early_stopping:
  _target_: lightning.pytorch.callbacks.EarlyStopping
  monitor: "val/loss"  # quantity to be monitored, must be specified !!!
  min_delta: 0.0  # minimum change in the monitored quantity to qualify as an improvement
  patience: 25  # number of checks with no improvement after which training will be stopped
  verbose: False  # verbosity mode
  mode: "min"  # "max" means higher metric value is better, can be also "min"
  strict: True  # whether to crash the training if monitor is not found in the validation metrics
  check_finite: True  # when set True, stops training when the monitor becomes NaN or infinite

lr_monitor:
  _target_: lightning.pytorch.callbacks.LearningRateMonitor
  logging_interval: "step"  # can be "epoch" or "step"
  log_momentum: False  # whether to log momentum values
  
model_summary:
  max_depth: 1
