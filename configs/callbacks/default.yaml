defaults:
  - model_checkpoint
  #- early_stopping
  - model_summary
  - rich_progress_bar
  - _self_

model_checkpoint:
  dirpath: ${paths.output_dir}/checkpoints
  filename: "epoch_{epoch:04d}"
  monitor: "val/loss"
  mode: "min"
  save_last: False
  auto_insert_metric_name: False

