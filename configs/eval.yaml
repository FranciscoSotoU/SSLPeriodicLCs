classes: ['CEP', 'DSCT', 'EA', 'EB/EW', 'LPV', 'Periodic-Other', 'RRLab', 'RRLc', 'RSCVn']
# passing checkpoint path is necessary for evaluation
ckpt_path: /home/fsoto/Documents/LCsSSL/logs/train/multiruns/mhspa_exp

