# @package _global_

# example hyperparameter optimization for flexible positional encoder with Optuna:
# python train.py -m hparams_search=flexible_encoder_optuna experiment=your_experiment

defaults:
  - override /hydra/sweeper: optuna
  - override /hydra/launcher: ray

# choose metric which will be optimized by Optuna
# make sure this is the correct name of some metric logged in lightning module!
optimized_metric: "val/loss"

# here we define Optuna hyperparameter search
# it optimizes for value returned from function with @hydra.main decorator
# docs: https://hydra.cc/docs/next/plugins/optuna_sweeper
hydra:
  mode: MULTIRUN # set hydra to multirun by default if this config is attached

  sweeper:
    #_target_: hydra._internal.core_plugins.basic_sweeper.BasicSweeper

    # storage URL to persist optimization results
    # for example, you can use SQLite if you set 'sqlite:///example.db'
    storage: sqlite:///optuna_study.db

    # name of the study to persist optimization results
    study_name: 'EncoderAblationStudy_${now:%Y%m%d_%H%M%S}'

    # number of parallel workers
    n_jobs: 6

    # 'minimize' or 'maximize' the objective
    direction: minimize

    # total number of runs that will be executed
    n_trials: 200

    # choose Optuna hyperparameter sampler
    # you can choose bayesian sampler (tpe), random search (without optimization), grid sampler, and others
    # docs: https://optuna.readthedocs.io/en/stable/reference/samplers.html
    sampler:
      _target_: optuna.samplers.TPESampler
      seed: 42
      n_startup_trials: 50  # Increased for boolean combinations
      n_ei_candidates: 32   # Slightly increased
      multivariate: true   # CRITICAL for boolean interactions
      prior_weight: 1.0
      consider_magic_clip: true
      consider_endpoints: false
      warn_independent_sampling: true
    # define hyperparameter search space
    params:
      # Flexible Encoder Boolean Parameters (shared for both bands)
      model.lc_net.time_encoder.use_mag_diff: choice(true, false)
      model.lc_net.time_encoder.use_abs_time_mlp: choice(true, false)
      model.lc_net.time_encoder.use_abs_mag_mlp: choice(true, false)
      model.lc_net.time_encoder.use_sinusoidal: choice(true, false)
      model.lc_net.time_encoder.use_conv_mag: choice(true, false)
      model.lc_net.time_encoder.use_time_diff: choice(true, false)
      model.lc_net.time_encoder.use_rate: choice(true, false)
      model.lc_net.time_encoder.use_band_embedding: choice(true, false)

  launcher:
    ray:
      init:
        num_gpus: 2
        num_cpus: 12
        runtime_env:
          env_vars:
            CUDA_VISIBLE_DEVICES: "0,1"
      remote:
        num_gpus: 0.33  # Cada trabajo usa 0.33 GPU (3 por GPU física)
        max_calls: 6   # 3 procesos paralelos